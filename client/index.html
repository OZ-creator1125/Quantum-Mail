<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />

    <title>Quantum Mail — Secure Temporary Email</title>
    <meta
      name="description"
      content="Premium 10-minute temporary email with a futuristic UI. Copy, receive, and reset instantly."
    />
    <meta name="robots" content="index,follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Quantum Mail — Secure Temporary Email" />
    <meta
      property="og:description"
      content="Premium 10-minute temporary email with a futuristic UI."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quantum Mail — Secure Temporary Email" />
    <meta
      name="twitter:description"
      content="Premium 10-minute temporary email with a futuristic UI."
    />
    <meta name="twitter:image" content="/og.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- ✅ Fonts (DOUBLE-SAFE) -->
    <!-- 1) Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 2) Main stylesheet -->
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- 3) Fallback: preload the CSS (helps some environments load it earlier) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      />
    </noscript>
  </head>

  <body class="qm-dark">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
